# vfam_trees auto-generated config for Avsunviroidae
# Generated: 2026-04-14
# Review and edit clustering thresholds and other parameters as needed.

download:
  max_per_species: 200
sequence:
  type: nucleotide
  region: whole_genome
  segment: null
quality:
  min_length: null
  max_ambiguous: 0.01
  exclude_organisms:
  - synthetic construct
  - metagenome
  - MAG
  - uncultured
  - unverified
  - vector
clustering:
  tool: mmseqs2
  threshold_min: 0.7
  threshold_max: 0.99
  max_reps_500: 20
  max_reps_100: 5
targets:
  max_500: 500
  max_100: 100
msa:
  tool: mafft
  options: --retree 1
tree_500:
  tool: fasttree
  options: ''
  model_nuc: GTR+G
  model_aa: WAG+G
tree_100:
  tool: iqtree
  options: --fast
  model_nuc: GTR+G
  model_aa: WAG+G
